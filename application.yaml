apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: infra-tools
spec:
  project: default
  source:
    repoURL: https://github.com/HornetRatHead/goit-argo.git
    targetRevision: main
    path: mlflow
    helm:
      version: v3
      values: |
        service:
          type: ClusterIP
          port: 5000
        postgresql:
          enabled: true
          image:
            tag: "15-debian-11"
          primary:
            persistence:
              enabled: false
          auth:
            postgresPassword: mlflowpass
        minio:
          enabled: true
          image:
            tag: "2023.10.24"
          persistence:
            enabled: false
        tracking:
          image:
            tag: "latest"
          persistence:
            enabled: false
        backend:
          image:
            tag: "latest"
  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
