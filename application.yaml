apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: infra-tools
spec:
  project: default
  source:
    repoURL: https://github.com/HornetRatHead/goit-argo.git
    targetRevision: main
    path: mlflow
    helm:
      version: v3
      values: |
        service:
          type: ClusterIP
          port: 5000
        postgresql:
          enabled: true
          image:
            registry: docker.io
            repository: bitnami/postgresql
            tag: 15.8.0-debian-12-r1
          primary:
            persistence:
              enabled: false
          auth:
            postgresPassword: mlflowpass
        minio:
          enabled: true
          image:
            registry: docker.io
            repository: bitnami/minio
            tag: 2024.8.26-debian-12-r2
          persistence:
            enabled: false
        tracking:
          image:
            tag: "latest"
          persistence:
            enabled: false
        backend:
          image:
            tag: "latest"
  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
