apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: infra-tools
spec:
  project: default
  source:
    repoURL: registry-1.docker.io/bitnamicharts
    chart: mlflow
    targetRevision: 5.2.1
    helm:
      values: |
        minio:
          enabled: true
          image:
            registry: docker.io
            repository: minio/minio
            tag: latest
          args: ["server", "/data", "--console-address", ":9001"]
          podSecurityContext:
            fsGroup: 1000
          containerSecurityContext:
            runAsUser: 1000
            runAsNonRoot: true
          persistence:
            enabled: false
          auth:
            rootUser: "minioadmin"
            rootPassword: "minioadmin"

        postgresql:
          image:
            tag: "latest"
          primary:
            persistence:
              enabled: false

        tracking:
          image:
            tag: 3.3.2
          persistence:
            enabled: false
          initContainers: []

  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
