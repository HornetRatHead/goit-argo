apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: infra-tools
spec:
  project: default
  source:
    repoURL: registry-1.docker.io/bitnamicharts
    chart: mlflow
    targetRevision: 5.1.17
    helm:
      values: |
        global:
          security:
            allowInsecureImages: true
          imagePullPolicy: IfNotPresent
        minio:
          enabled: true
          image:
            registry: docker.io
            repository: bitnami/minio
            tag: 2024.8.29-debian-12-r0
          podSecurityContext:
            enabled: true
            fsGroup: 1000
          containerSecurityContext:
            enabled: true
            runAsUser: 1000
          persistence:
            enabled: false
          auth:
            rootUser: "minioadmin"
            rootPassword: "minioadmin"
          provisioning:
            enabled: false
          waiter:
            enabled: false
            
        postgresql:
          enabled: true
          image:
            registry: docker.io
            repository: bitnami/postgresql
            tag: 16.4.0-debian-12-r8
          primary:
            persistence:
              enabled: false

        tracking:
          image:
            registry: ghcr.io
            repository: mlflow/mlflow
            tag: latest
          persistence:
            enabled: false
          initContainers: []
          waiter:
            enabled: false

        run:
          waiter:
            enabled: false
destination:
    server: https://kubernetes.default.svc
    namespace: mlflow-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
