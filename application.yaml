apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: infra-tools
spec:
  project: default
  source:
    repoURL: registry-1.docker.io/bitnamicharts
    chart: mlflow
    targetRevision: 5.1.17
    helm:
      values: |
        global:
            security:
              allowInsecureImages: true
        minio:
          enabled: true
          podSecurityContext:
            enabled: true
            fsGroup: 1000
          containerSecurityContext:
            enabled: true
            runAsUser: 1000
          persistence:
            enabled: false
          auth:
            rootUser: "minioadmin"
            rootPassword: "minioadmin"

        postgresql:
          enabled: true
          primary:
            persistence:
              enabled: false

        tracking:
          image:
            registry: ghcr.io
            repository: mlflow/mlflow
            tag: latest
          persistence:
            enabled: false
          initContainers: []

  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
